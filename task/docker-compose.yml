version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: store
    ports:
      - "5438:5432"        
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8085:8080"         
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "host=db user=postgres password=postgres dbname=store port=5432 sslmode=disable"

volumes:
  postgres_data: